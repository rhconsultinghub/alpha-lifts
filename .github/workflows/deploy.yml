name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # The deployed Worker URL for the AI coach. A repository *variable* rather than a
          # secret on purpose: Vite inlines every VITE_* value into the JS bundle, so this is
          # world-readable once shipped and pretending otherwise just makes it harder to debug.
          # The Worker's origin allowlist, not obscurity, is what stops other sites using it.
          # Unset is a supported state — coach.ts renders a "not configured" tab, so the build
          # succeeds and the rest of the app is unaffected until this is populated.
          VITE_COACH_API_URL: ${{ vars.VITE_COACH_API_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
